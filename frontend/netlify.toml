# Netlify Configuration for VoteQuest Frontend

[build]
# Build command that generates the static site in 'out' directory
command = "npm run build"
# Directory to deploy (Next.js static export output)
publish = "out"
# Node.js runtime version
node_version = "18.17.0"

[build.environment]
# Ensure Next.js uses static export
NEXT_PUBLIC_API_URL = "https://votequest-api-393608700696.us-central1.run.app"

# Handle SPA routing - redirect all non-file requests to index.html
[[redirects]]
from = "/*"
to = "/200.html"
status = 200

# Cache settings for static assets
[[headers]]
for = "/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

# Cache settings for HTML files with shorter TTL
[[headers]]
for = "/*.html"
[headers.values]
Cache-Control = "public, max-age=3600"
